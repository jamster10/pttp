- quote: "The power Trio Playing to the Plants is actually named due to the fact that they like to go loud and hard and many times do so outside (and inside) to the plants. They've played the Lumberyard Music Hall many times and every time they do, their  powerful, lyric- driven music is hard driving! Their use of multimeter and frequent tempo shifts thrills, excites and keeps the listener on their toes! Everyone in the place has a great time when PTTP plays the Lumberyard! The lead singer Mary Cay Schultz is a wildwoman on the mic and the guitar! This group is very tight. They're really talented musicians and song writers!!!"
  source: "Jeff Brister - Bastrop Academy of Music"
